<head>
<meta charset="UTF-8">

<title>個人 Kobo 書庫 · 查詢工具</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#F7F5F0;--surface:#FFFFFF;--surface2:#FBFAF7;
    --border:#E4DFD7;--border-strong:#CAC3B8;
    --text:#1B1915;--text2:#6B6459;--text3:#A69E94;
    --accent:#2E5D8E;--accent-bg:#EAF1F8;
    --done:#1A6B3F;--done-bg:#E7F4ED;
    --reading:#B26B15;--reading-bg:#FBF0E2;
    --unread:#7A7168;--unread-bg:#F0ECE6;
    --star:#E0A82E;
    --radius:8px;--radius-sm:5px;
    --sans:'Noto Sans TC',system-ui,-apple-system,sans-serif;
    --mono:'JetBrains Mono','Courier New',monospace;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#15130E;--surface:#1E1B15;--surface2:#241F18;
    --border:#302C24;--border-strong:#48433A;
    --text:#F0ECE5;--text2:#9E9384;--text3:#6A6157;
    --accent:#6EA3D8;--accent-bg:#1B2839;
    --done:#4FB584;--done-bg:#10281D;
    --reading:#D9903E;--reading-bg:#2A1E10;
    --unread:#8B8177;--unread-bg:#26221A;
    --star:#E8B84B;
  }}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;padding-bottom:3rem}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:1.25rem 1.75rem}
  .h-top{display:flex;align-items:baseline;gap:1rem;flex-wrap:wrap}
  .title{font-size:22px;font-weight:700;letter-spacing:-.3px}
  .title span{color:var(--accent)}
  .subtitle{font-size:13px;color:var(--text3)}
  .h-actions{margin-left:auto;display:flex;gap:.5rem}
  .btn{font-family:inherit;font-size:12.5px;padding:.4rem .75rem;border:1px solid var(--border-strong);background:var(--surface2);color:var(--text2);border-radius:var(--radius-sm);cursor:pointer;transition:.12s}
  .btn:hover{border-color:var(--accent);color:var(--accent)}

  /* Tabs */
  .tabs{display:flex;gap:2px;background:var(--surface);padding:0 1.75rem;border-bottom:1px solid var(--border);overflow-x:auto}
  .tab{font-family:inherit;font-size:14px;padding:.7rem 1rem;border:none;background:none;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.12s}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
  .tab .cnt{font-size:11px;color:var(--text3);margin-left:.3rem}

  /* Controls */
  .controls{background:var(--surface);padding:1rem 1.75rem;border-bottom:1px solid var(--border);display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
  .search-wrap{position:relative;flex:1;min-width:200px}
  .search-wrap .ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
  input[type=search],select{font-family:inherit;font-size:14px;padding:.5rem .7rem;border:1px solid var(--border-strong);background:var(--bg);color:var(--text);border-radius:var(--radius-sm);outline:none;transition:.12s}
  input[type=search]{width:100%;padding-left:2rem}
  input:focus,select:focus{border-color:var(--accent)}
  select{cursor:pointer;max-width:190px}
  .info{font-size:13px;color:var(--text3);white-space:nowrap;margin-left:auto}
  .clear-btn{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:inherit}

  /* Active tag filters */
  .tagbar{padding:.4rem 1.75rem 0;display:flex;gap:.4rem;flex-wrap:wrap;align-items:center}
  .tagchip{font-size:12px;padding:.25rem .6rem;border-radius:20px;background:var(--accent-bg);color:var(--accent);cursor:pointer;border:1px solid transparent;user-select:none;transition:.12s}
  .tagchip:hover{border-color:var(--accent)}
  .tagchip.pop{background:var(--surface2);color:var(--text2);border-color:var(--border)}
  .tagbar-label{font-size:12px;color:var(--text3)}

  /* Table */
  .wrap{padding:1rem 1.75rem}
  table{width:100%;border-collapse:collapse;font-size:13.5px;table-layout:fixed}
  col.c-star{width:70px}col.c-id{width:46px}col.c-title{width:auto}
  col.c-author{width:118px}col.c-cat{width:88px}col.c-tags{width:200px}
  col.c-series{width:120px}col.c-status{width:70px}
  th{text-align:left;padding:8px 10px;font-size:11.5px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--text3);border-bottom:2px solid var(--border-strong);position:sticky;top:0;background:var(--bg);z-index:1;cursor:pointer;user-select:none}
  th.nosort{cursor:default}
  th .arrow{font-size:9px;margin-left:2px;opacity:.6}
  td{padding:8px 10px;vertical-align:top;border-bottom:1px solid var(--border)}
  tbody tr:hover{background:var(--surface2)}
  .td-id{color:var(--text3);font-family:var(--mono);font-size:12px}
  .td-title{line-height:1.45;word-break:break-word}
  .td-author{color:var(--text2);font-size:12.5px}
  .td-cat{font-size:11.5px;color:var(--text3)}
  .td-tags{font-size:11px}
  .mtag{display:inline-block;background:var(--accent-bg);color:var(--accent);padding:1px 6px;border-radius:3px;margin:1px 2px 1px 0;cursor:pointer}
  .mtag:hover{outline:1px solid var(--accent)}
  .stag{display:inline-block;color:var(--text3);padding:1px 3px;margin:1px}
  .series-tag{font-size:11px;color:var(--reading);background:var(--reading-bg);padding:1px 6px;border-radius:3px}
  .badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600}
  .b-done{background:var(--done-bg);color:var(--done)}
  .b-reading{background:var(--reading-bg);color:var(--reading)}
  .b-unread{background:var(--unread-bg);color:var(--unread)}

  /* Stars */
  .stars{display:flex;gap:1px;font-size:15px;line-height:1;cursor:default}
  .star{cursor:pointer;color:var(--border-strong);transition:.1s;user-select:none}
  .star:hover{transform:scale(1.15)}
  .star.on{color:var(--star)}

  .empty{text-align:center;padding:3.5rem 1rem;color:var(--text3)}
  .empty .ic{font-size:34px;opacity:.4;display:block;margin-bottom:.6rem}

  /* Stat cards for overview */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;background:var(--border);margin:1rem 1.75rem;border-radius:var(--radius);overflow:hidden}
  .stat{background:var(--surface);padding:.9rem 1.1rem}
  .stat-n{font-size:25px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
  .stat-l{font-size:12px;color:var(--text2);margin-top:3px}

  .hint{font-size:12px;color:var(--text3);padding:.5rem 1.75rem;background:var(--surface2);border-bottom:1px solid var(--border)}

  @media(max-width:720px){
    header,.controls,.tabs,.wrap,.tagbar,.stats,.hint{padding-left:1rem;padding-right:1rem}
    .stats{margin-left:1rem;margin-right:1rem}
    select{max-width:none;flex:1;min-width:calc(50% - .3rem)}
    .search-wrap{min-width:100%}
    .info{margin-left:0}

    /* 表格轉卡片 */
    table,thead,tbody,tr,td,th,colgroup,col{display:block}
    thead{position:absolute;left:-9999px}      /* 隱藏表頭,改用 data-label */
    table{table-layout:auto}
    tbody tr{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);margin-bottom:.7rem;padding:.7rem .9rem;
      position:relative;
    }
    tbody tr:hover{background:var(--surface)}
    tbody td{
      border:none;padding:.2rem 0;display:flex;
      align-items:flex-start;gap:.6rem;
    }
    /* 用 data-label 當每格的欄位名 */
    tbody td::before{
      content:attr(data-label);flex:0 0 3.2em;
      font-size:11px;color:var(--text3);padding-top:2px;
      font-weight:600;
    }
    /* 書名獨佔一行、放大、無標籤前綴 */
    tbody td.td-title{
      font-size:15px;font-weight:600;line-height:1.4;
      padding:.1rem 0 .4rem;
    }
    tbody td.td-title::before{display:none}
    /* 書號淡化,浮右上 */
    tbody td.td-id{
      position:absolute;top:.6rem;right:.9rem;padding:0;font-size:11px;
    }
    tbody td.td-id::before{display:none}
    /* 星等左上,無前綴 */
    tbody td:first-child{padding-bottom:.3rem}
    tbody td:first-child::before{display:none}
    .td-tags{flex-wrap:wrap}
    .td-tags::before{flex-basis:100%;margin-bottom:2px}

    /* 套書/統計頁的簡易表格維持正常表格排列(不轉卡片) */
    #content .wrap table.plain,
    #content .wrap table.plain thead,
    #content .wrap table.plain tbody,
    #content .wrap table.plain tr,
    #content .wrap table.plain td,
    #content .wrap table.plain th{display:revert}
    #content .wrap table.plain{display:table;width:100%}
    #content .wrap table.plain tr{
      background:none;border:none;border-radius:0;margin:0;padding:0;
      border-bottom:1px solid var(--border);
    }
    #content .wrap table.plain td{
      display:table-cell;border:none;padding:7px 8px;
    }
    #content .wrap table.plain td::before{display:none}
    #content .wrap table.plain .badge{white-space:nowrap}
  }
</style>

<script>
/* ===== 個人 Kobo 書庫查詢工具 ===== */
(function(){
  const DATA = JSON.parse(document.getElementById('DATA').textContent);
  const BOOKS = DATA.books;
  const MAIN_TAGS = DATA.mainTags;
  const CATS = ['商業與投資理財','個人成長與心理學','知識科普與技能','小說與文學','歷史、地理與人文','兒童與青少年','健康醫學與生活','傳記與回憶錄','靈性與哲學思考','愛情與古典文化'];

  const LS_KEY = 'kobo_stars_v1';
  let stars = {};
  try { stars = JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch(e){ stars = {}; }
  function saveStars(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(stars)); }catch(e){} }
  function getStar(id){ return stars[id] || 0; }
  function setStar(id, n){
    if(getStar(id)===n) n=0;           // 再點同星 = 取消
    if(n===0) delete stars[id]; else stars[id]=n;
    saveStars();
  }

  let view = 'all';
  let activeTags = new Set();          // 多選標籤交叉
  let sortKey = null, sortDir = 1;

  // ---- 填充下拉 ----
  const fCat = document.getElementById('fCat');
  CATS.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; fCat.appendChild(o); });
  const fTag = document.getElementById('fTag');
  MAIN_TAGS.forEach(t=>{ const o=document.createElement('option'); o.value=t; o.textContent=t; fTag.appendChild(o); });

  const q=document.getElementById('q'), fStatus=document.getElementById('fStatus');
  const info=document.getElementById('info'), content=document.getElementById('content');
  const tagbar=document.getElementById('tagbar'), viewHint=document.getElementById('viewHint');
  const controls=document.getElementById('controls');

  const HINTS = {
    all:'點主標籤可加入交叉篩選；點欄位標題可排序。',
    queue:'標星的書依星等排序，作為你的閱讀優先清單。點☆設定 1–3 星。',
    reading:'目前進度 16% 以上、真正在讀的書。',
    cleanup:'未讀且新增滿一年的書（最舊在前）— 適合逐一決定「續讀」或「放生」。',
    series:'作品套書一覽，一眼看每套讀到第幾集。',
    stats:'藏書結構與閱讀狀態總覽。'
  };

  // ---- 篩選核心 ----
  function baseFilter(list){
    const kw=q.value.trim().toLowerCase();
    const cat=fCat.value, tag=fTag.value, st=fStatus.value;
    return list.filter(b=>{
      if(kw){
        const hay=(b.t+b.a+b.mt.join('')+b.st.join('')).toLowerCase();
        if(!hay.includes(kw)) return false;
      }
      if(cat && b.c!==cat) return false;
      if(tag && !b.mt.includes(tag)) return false;
      if(st && b.status!==st) return false;
      for(const at of activeTags){ if(!b.mt.includes(at)) return false; }
      return true;
    });
  }

  function statusBadge(s){
    if(s==='完成') return '<span class="badge b-done">完成</span>';
    if(s==='閱讀中') return '<span class="badge b-reading">閱讀中</span>';
    return '<span class="badge b-unread">未讀</span>';
  }
  function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  function starHtml(id){
    const cur=getStar(id); let h='<div class="stars" data-id="'+id+'">';
    for(let i=1;i<=3;i++) h+='<span class="star'+(i<=cur?' on':'')+'" data-n="'+i+'">'+(i<=cur?'★':'☆')+'</span>';
    return h+'</div>';
  }
  function tagsHtml(b){
    let h=b.mt.map(t=>'<span class="mtag" data-tag="'+esc(t)+'">'+esc(t)+'</span>').join('');
    h+=b.st.slice(0,3).map(t=>'<span class="stag">'+esc(t)+'</span>').join('');
    return h||'—';
  }
  function seriesHtml(b){
    if(!b.s) return '—';
    return '<span class="series-tag">'+esc(b.s)+' '+esc(b.v)+'</span>';
  }

  function rowHtml(b, showDate){
    return '<tr>'+
      '<td data-label="星">'+starHtml(b.id)+'</td>'+
      '<td class="td-id" data-label="#">'+b.id+'</td>'+
      '<td class="td-title" data-label="書名">'+esc(b.t)+'</td>'+
      '<td class="td-author" data-label="作者">'+esc(b.a)+'</td>'+
      '<td class="td-cat" data-label="分類">'+esc(b.c.replace(/與.*/,''))+'</td>'+
      '<td class="td-tags" data-label="標籤">'+tagsHtml(b)+'</td>'+
      '<td class="td-series" data-label="系列">'+seriesHtml(b)+'</td>'+
      '<td data-label="狀態">'+statusBadge(b.status)+'</td>'+
      (showDate?'<td class="td-id" data-label="日期" style="position:static">'+esc(b.d||'')+'</td>':'')+
    '</tr>';
  }

  function tableHtml(list, showDate){
    if(!list.length) return '<div class="empty"><span class="ic">🔍</span>找不到符合的書籍</div>';
    const arrow=k=> sortKey===k?('<span class="arrow">'+(sortDir>0?'▲':'▼')+'</span>'):'';
    const dateCol = showDate ? '<col style="width:88px">' : '';
    const dateHead = showDate ? '<th class="nosort">新增日期</th>' : '';
    return '<div class="wrap"><table><colgroup>'+
      '<col class="c-star"><col class="c-id"><col class="c-title"><col class="c-author">'+
      '<col class="c-cat"><col class="c-tags"><col class="c-series"><col class="c-status">'+dateCol+'</colgroup>'+
      '<thead><tr>'+
      '<th class="nosort" data-sort="star">星</th>'+
      '<th data-sort="id">#'+arrow('id')+'</th>'+
      '<th data-sort="t">書名'+arrow('t')+'</th>'+
      '<th class="h-author" data-sort="a">作者'+arrow('a')+'</th>'+
      '<th data-sort="c">分類'+arrow('c')+'</th>'+
      '<th class="h-tags nosort">標籤</th>'+
      '<th class="h-series nosort">系列</th>'+
      '<th data-sort="status">狀態'+arrow('status')+'</th>'+dateHead+
      '</tr></thead><tbody>'+
      list.map(b=>rowHtml(b,showDate)).join('')+'</tbody></table></div>';
  }

  function sortList(list){
    if(!sortKey) return list;
    const arr=list.slice();
    arr.sort((a,b)=>{
      let x=a[sortKey], y=b[sortKey];
      if(sortKey==='id'){ return (x-y)*sortDir; }
      if(sortKey==='status'){ const o={'閱讀中':0,'未讀':1,'完成':2}; return (o[x]-o[y])*sortDir; }
      x=String(x); y=String(y);
      return x.localeCompare(y,'zh-Hant')*sortDir;
    });
    return arr;
  }

  // ---- 各檢視 ----
  function renderAll(){
    let list=sortList(baseFilter(BOOKS));
    info.textContent='共 '+list.length+' 本';
    content.innerHTML=tableHtml(list);
  }
  function renderReading(){
    let list=sortList(baseFilter(BOOKS.filter(b=>b.status==='閱讀中')));
    info.textContent=list.length+' 本閱讀中';
    content.innerHTML=tableHtml(list);
  }
  function renderQueue(){
    let list=baseFilter(BOOKS.filter(b=>getStar(b.id)>0));
    list.sort((a,b)=> getStar(b.id)-getStar(a.id) || a.id-b.id);
    info.textContent=list.length+' 本已標星';
    if(!list.length){
      content.innerHTML='<div class="empty"><span class="ic">⭐</span>還沒有標星的書。<br>到「全部書籍」點☆，把想優先讀的加進佇列。</div>';
      return;
    }
    content.innerHTML=tableHtml(list);
  }
  function isOld(d){
    const m=/(\d{4})\/(\d+)/.exec(d||''); if(!m) return false;
    const y=+m[1], mo=+m[2];
    const now=new Date(); const cy=now.getFullYear(), cm=now.getMonth()+1;
    return (y<cy-1) || (y===cy-1 && mo<=cm);   // 超過約一年
  }
  function renderCleanup(){
    let list=baseFilter(BOOKS.filter(b=>b.status==='未讀' && isOld(b.d)));
    list.sort((a,b)=>(a.d||'').localeCompare(b.d||''));   // 最舊在前
    info.textContent=list.length+' 本未讀滿一年待決定';
    content.innerHTML=tableHtml(list,true);   // 顯示日期
  }
  function renderSeries(){
    controls.style.display='none'; tagbar.style.display='none';
    const groups={};
    BOOKS.forEach(b=>{ if(b.s){ (groups[b.s]=groups[b.s]||[]).push(b); } });
    let html='<div class="wrap">';
    Object.keys(groups).sort((a,b)=>groups[b].length-groups[a].length).forEach(s=>{
      const items=groups[s].slice().sort((a,b)=>{
        const na=parseInt(a.v)||0, nb=parseInt(b.v)||0; return na-nb || a.id-b.id;
      });
      const done=items.filter(x=>x.status==='完成').length;
      html+='<div style="margin-bottom:1.5rem"><div style="font-weight:600;font-size:15px;margin-bottom:.4rem">'+
        esc(s)+' <span style="font-size:12px;color:var(--text3);font-weight:400">'+items.length+' 本 · 完成 '+done+'</span></div>';
      html+='<table class="plain"><tbody>';
      items.forEach(b=>{
        html+='<tr>'+
          '<td class="td-title">'+esc(b.t)+' <span style="color:var(--text3);font-size:12px;font-weight:400">· 第'+esc(b.v)+'集</span></td>'+
          '<td style="width:64px;text-align:right">'+statusBadge(b.status)+'</td></tr>';
      });
      html+='</tbody></table></div>';
    });
    content.innerHTML=html+'</div>';
  }
  function renderStats(){
    controls.style.display='none'; tagbar.style.display='none';
    const total=BOOKS.length;
    const sc={完成:0,閱讀中:0,未讀:0}; BOOKS.forEach(b=>sc[b.status]++);
    const cc={}; CATS.forEach(c=>cc[c]=0); BOOKS.forEach(b=>cc[b.c]++);
    const starred=BOOKS.filter(b=>getStar(b.id)>0).length;
    let html='<div class="stats">'+
      card(total,'全部書籍')+card(sc.完成,'已完成')+card(sc.閱讀中,'閱讀中')+
      card(sc.未讀,'未讀')+card(starred,'已標星')+
      card((sc.完成/total*100).toFixed(1)+'%','完成率')+'</div>';
    html+='<div class="wrap"><table class="plain"><thead><tr><th class="nosort">主分類</th><th class="nosort">本數</th><th class="nosort">佔比</th></tr></thead><tbody>';
    CATS.forEach(c=>{
      const pct=(cc[c]/total*100).toFixed(1);
      html+='<tr><td class="td-title">'+esc(c)+'</td><td class="td-id">'+cc[c]+'</td>'+
        '<td style="color:var(--text2)"><div style="display:inline-block;height:8px;background:var(--accent);border-radius:2px;width:'+(cc[c]/139*100)+'px;vertical-align:middle;margin-right:6px"></div>'+pct+'%</td></tr>';
    });
    html+='</tbody></table></div>';
    content.innerHTML=html;
    function card(n,l){ return '<div class="stat"><div class="stat-n">'+n+'</div><div class="stat-l">'+l+'</div></div>'; }
  }

  // ---- 標籤交叉列 ----
  function renderTagbar(){
    if(view==='series'||view==='stats'){ tagbar.style.display='none'; return; }
    tagbar.style.display='flex';
    let h='<span class="tagbar-label">熱門標籤：</span>';
    // 顯示前 16 個熱門主標籤 + 已選中的
    const show=MAIN_TAGS.slice(0,16);
    activeTags.forEach(t=>{ if(!show.includes(t)) show.push(t); });
    show.forEach(t=>{
      const on=activeTags.has(t);
      h+='<span class="tagchip'+(on?'':' pop')+'" data-tag="'+esc(t)+'">'+(on?'✓ ':'')+esc(t)+'</span>';
    });
    tagbar.innerHTML=h;
  }

  // ---- 主渲染 ----
  function render(){
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===view));
    viewHint.textContent=HINTS[view]||'';
    if(view!=='series'&&view!=='stats') controls.style.display='flex';
    renderTagbar();
    if(view==='all') renderAll();
    else if(view==='reading') renderReading();
    else if(view==='queue') renderQueue();
    else if(view==='cleanup') renderCleanup();
    else if(view==='series') renderSeries();
    else if(view==='stats') renderStats();
    updateCounts();
  }

  function updateCounts(){
    document.getElementById('cnt-all').textContent=BOOKS.length;
    document.getElementById('cnt-queue').textContent=BOOKS.filter(b=>getStar(b.id)>0).length;
    document.getElementById('cnt-reading').textContent=BOOKS.filter(b=>b.status==='閱讀中').length;
    document.getElementById('cnt-cleanup').textContent=BOOKS.filter(b=>b.status==='未讀').length;
    document.getElementById('cnt-series').textContent=new Set(BOOKS.filter(b=>b.s).map(b=>b.s)).size;
  }

  // ---- 事件 ----
  document.getElementById('tabs').addEventListener('click',e=>{
    const t=e.target.closest('.tab'); if(!t) return;
    view=t.dataset.view; render();
  });
  q.addEventListener('input',render);
  fCat.addEventListener('change',render);
  fTag.addEventListener('change',render);
  fStatus.addEventListener('change',render);
  document.getElementById('clearBtn').addEventListener('click',()=>{
    q.value='';fCat.value='';fTag.value='';fStatus.value='';activeTags.clear();render();
  });

  // 點標籤(表格內或 tagbar)加入交叉
  document.addEventListener('click',e=>{
    const chip=e.target.closest('[data-tag]');
    if(chip){
      const t=chip.dataset.tag;
      if(activeTags.has(t)) activeTags.delete(t); else activeTags.add(t);
      render(); return;
    }
    const star=e.target.closest('.star');
    if(star){
      const box=star.closest('.stars'); const id=+box.dataset.id; const n=+star.dataset.n;
      setStar(id,n); render(); return;
    }
  });

  // 匯出/匯入星等
  document.getElementById('exportBtn').addEventListener('click',()=>{
    const blob=new Blob([JSON.stringify(stars,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download='kobo_stars_backup.json'; a.click();
  });
  document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change',e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{ try{ stars=JSON.parse(r.result)||{}; saveStars(); render(); alert('星等已匯入'); }catch(err){ alert('檔案格式錯誤'); } };
    r.readAsText(f);
  });

  // 排序點擊
  document.addEventListener('click',e=>{
    const th=e.target.closest('th[data-sort]'); if(!th||th.classList.contains('nosort')) return;
    const k=th.dataset.sort;
    if(sortKey===k) sortDir=-sortDir; else { sortKey=k; sortDir=1; }
    render();
  });

  render();
})();

</script>
</body>
</html>
